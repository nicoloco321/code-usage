; Claude Code usage display
;
; Default target: Waveshare ESP32-C6-LCD-1.47, an ESP32-C6 dev board with an
; integrated 172x320 ST7789 TFT.
;
; Other targets:
;   pio run -e esp32-3248s035 -t upload  Sunton ESP32-3248S035 (480x320 ST7796, "Cheap Yellow Display")
;   pio run -e ili9488 -t upload         plain ESP32 + separate ILI9488 480x320 module
; Wire separate modules to the pins listed in each env below.

[platformio]
default_envs = waveshare-c6-lcd-147

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4

; Flags shared by every panel. Per-panel dimensions, driver and pins live in
; each [env:*] below so a single build never sees two TFT_WIDTH definitions.
[common]
build_flags =
    -DUSER_SETUP_LOADED=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000

; Sunton ESP32-3248S035C / S035R — integrated ST7796 480x320 panel
[env:esp32-3248s035]
platform = espressif32
board = esp32dev
build_flags =
    ${common.build_flags}
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DST7796_DRIVER=1
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH

; Generic ESP32 + separate ILI9488 480x320 SPI module
[env:ili9488]
platform = espressif32
board = esp32dev
build_flags =
    ${common.build_flags}
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DILI9488_DRIVER=1
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=HIGH

; Waveshare ESP32-C6-LCD-1.47 — integrated 172x320 ST7789 panel.
;
; The ESP32-C6 (RISC-V, Wi-Fi 6) needs Arduino-ESP32 core 3.x, which the stock
; PlatformIO "espressif32" platform does not ship. We use the pioarduino fork.
; If this download 404s, grab the newest tag from:
;   https://github.com/pioarduino/platform-espressif32/releases
;
; Uses LovyanGFX rather than TFT_eSPI: TFT_eSPI has no ESP32-C6 processor
; driver (it miscompiles the RISC-V SPI/GPIO as if it were a classic Xtensa
; ESP32). LovyanGFX supports the C6 natively. The panel pins, driver, colour
; order and 172x320 offset are all in firmware/src/display.h. Double-check the
; pins against the board wiki if you get a blank screen:
;   https://www.waveshare.com/wiki/ESP32-C6-LCD-1.47
[env:waveshare-c6-lcd-147]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-devkitc-1
; LovyanGFX bundles every font, so give the app partition room (no OTA needed).
board_build.partitions = huge_app.csv
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -DUSE_LOVYANGFX=1
    -DLGFX_USE_V1
    ; native USB-Serial/JTAG so the serial monitor works over the USB-C port
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
